services:
  - type: web
    name: agrobridge-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: agrobridge-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://agrobridge-v2.vercel.app,http://localhost:3000
      - key: FRONTEND_URL
        value: https://agrobridge-v2.vercel.app
      # Add these manually in the Render dashboard (do not commit real keys):
      # - key: PAYSTACK_SECRET_KEY
      # - key: PAYSTACK_PUBLIC_KEY
      # - key: CLAUDE_API_KEY

databases:
  - name: agrobridge-db
    databaseName: agrobridge
    plan: free
