services:
  - type: web
    name: agrobridge-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://agrobridge-v2.vercel.app,http://localhost:3000
      - key: FRONTEND_URL
        value: https://agrobridge-v2.vercel.app
      # Add these manually in the Render dashboard (do not commit real keys):
      # - key: DATABASE_URL  (Supabase Session Pooler connection string — NOT a Render-managed
      #     database. Deliberately not declared here via `fromDatabase` + a `databases:` block —
      #     that combination is what let a Blueprint sync silently revert this back to Render's own
      #     default Postgres, which is exactly what broke production login on 2026-07-23. Set this
      #     by hand in the dashboard and keep it out of this file.)
      # - key: PAYSTACK_SECRET_KEY
      # - key: PAYSTACK_PUBLIC_KEY
      # - key: CLAUDE_API_KEY
      # - key: GOOGLE_CLIENT_ID  (same value as NEXT_PUBLIC_GOOGLE_CLIENT_ID on Vercel — from Google Cloud Console, OAuth 2.0 Client ID, Web application type)
